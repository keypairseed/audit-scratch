name: Audit Campaign

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:
    inputs:
      invariant_runs:
        description: 'Invariant runs (fork tests — keep LOW, RPC-bound)'
        required: false
        default: '500'
      invariant_depth:
        description: 'Invariant depth (calls per sequence)'
        required: false
        default: '20'

env:
  ETH_RPC_URL:       ${{ secrets.ETH_RPC_URL }}
  ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}

jobs:

  # ── Slither (статический анализ) ─────────────────────────────────────────
  static:
    name: Slither Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        with:
          node-version: '20'
          slither-args: '--json slither.json --filter-paths "test|lib"'
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: slither-${{ github.run_number }}
          path: slither.json

  # ── Build и базовые тесты ────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            cache/
            out/
          key: build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}
          restore-keys: build-

      - name: Forge build
        run: forge build

      - name: Quick tests (no fork)
        run: forge test --no-match-test "Fork|fork|Invariant|invariant" -v
        continue-on-error: true

  # ── Balancer v2 Precision Hunt ────────────────────────────────────────────
  balancer:
    name: Balancer Invariant
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            cache/
            out/
          key: build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}

      - name: Build
        run: forge build

      # ИСПРАВЛЕНО: пиннинг блока внутри теста (vm.createSelectFork с числом)
      # FOUNDRY_INVARIANT_RUNS снижен — на fork каждый run = RPC вызовы
      - name: Balancer Precision Invariant
        env:
          FOUNDRY_INVARIANT_RUNS:           ${{ github.event.inputs.invariant_runs || '500' }}
          FOUNDRY_INVARIANT_DEPTH:          ${{ github.event.inputs.invariant_depth || '20' }}
          FOUNDRY_INVARIANT_FAIL_ON_REVERT: "false"
          FOUNDRY_FUZZ_RUNS:                "1000"
        run: |
          forge test \
            --match-contract BalancerPrecisionInvariant \
            -vv 2>&1 | tee balancer.log
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: balancer-${{ github.run_number }}
          path: balancer.log

  # ── Lido Oracle Boundary ──────────────────────────────────────────────────
  lido:
    name: Lido Invariant
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            cache/
            out/
          key: build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}

      - name: Build
        run: forge build

      # ИСПРАВЛЕНО: блок запинен в setUp() (22_000_000)
      # runs снижен с 100000 до 500 — fork RPC bound, не CPU bound
      - name: Lido Oracle Invariant
        env:
          FOUNDRY_INVARIANT_RUNS:           ${{ github.event.inputs.invariant_runs || '500' }}
          FOUNDRY_INVARIANT_DEPTH:          ${{ github.event.inputs.invariant_depth || '20' }}
          FOUNDRY_INVARIANT_FAIL_ON_REVERT: "false"
          FOUNDRY_FUZZ_RUNS:                "1000"
        run: |
          forge test \
            --match-contract LidoOracleInvariant \
            -vv 2>&1 | tee lido.log
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lido-${{ github.run_number }}
          path: lido.log

  # ── Origin Protocol ───────────────────────────────────────────────────────
  origin:
    name: Origin Protocol Invariant
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: build
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            cache/
            out/
          key: build-${{ hashFiles('src/**/*.sol', 'test/**/*.sol', 'foundry.toml') }}

      - name: Build
        run: forge build

      - name: Origin Protocol Invariant
        env:
          FOUNDRY_INVARIANT_RUNS:           ${{ github.event.inputs.invariant_runs || '500' }}
          FOUNDRY_INVARIANT_DEPTH:          ${{ github.event.inputs.invariant_depth || '20' }}
          FOUNDRY_INVARIANT_FAIL_ON_REVERT: "false"
          FOUNDRY_FUZZ_RUNS:                "1000"
        run: |
          forge test \
            --match-contract OriginProtocolInvariant \
            -vv 2>&1 | tee origin.log
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: origin-${{ github.run_number }}
          path: origin.log

