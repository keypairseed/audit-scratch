# .github/workflows/audit-campaign.yml
name: Smart Contract Audit Campaign

# Триггеры запуска
on:
  push:
    branches: [ main, develop ]
  pull_request:
  # Каждую ночь в 22:00 UTC
  schedule:
    - cron: '0 22 * * *'
  # Ручной запуск с параметрами
  workflow_dispatch:
    inputs:
      profile:
        description: 'Foundry profile (default/ci/deep)'
        required: false
        default: 'ci'
      target:
        description: 'Specific contract to test (empty = all)'
        required: false
        default: ''

# Настройки окружения
env:
  FOUNDRY_PROFILE: ${{ github.event.inputs.profile || 'ci' }}
  # RPC провайдеры (настраивай в Secrets)
  ETH_RPC_URL:   ${{ secrets.ETH_RPC_URL }}
  ARB_RPC_URL:   ${{ secrets.ARB_RPC_URL }}
  BASE_RPC_URL:  ${{ secrets.BASE_RPC_URL }}

jobs:

  # ================================================================
  # JOB 1: Быстрый статический анализ (5-10 минут)
  # ================================================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run Slither
        uses: crytic/slither-action@v0.4.0
        id: slither
        with:
          node-version: '20'
          slither-args: >-
            --json slither-output.json
            --checklist
            --markdown-root ${{ github.server_url }}/${{ github.repository }}/blob/${{ github.sha }}/
            --filter-paths "test|mock|lib|node_modules"
        continue-on-error: true

      - name: Install Aderyn
        run: |
          curl -L https://raw.githubusercontent.com/Cyfrin/aderyn/dev/aderynup/install | bash
          echo "$HOME/.aderyn/bin" >> $GITHUB_PATH

      - name: Run Aderyn
        run: |
          aderyn src/ \
            --output aderyn-report.md \
            --src src/ \
          || true

      - name: Upload static analysis results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: static-analysis-${{ github.run_number }}
          path: |
            slither-output.json
            aderyn-report.md

      - name: Post Slither Summary
        if: always()
        run: |
          echo "## 🔍 Static Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f slither-output.json ]; then
            HIGH=$(cat slither-output.json | python3 -c "
import sys, json
data = json.load(sys.stdin)
detectors = data.get('results', {}).get('detectors', [])
high = [d for d in detectors if d.get('impact','').lower() in ['high','critical']]
print(len(high))
" 2>/dev/null || echo "0")
            echo "### Slither: $HIGH High/Critical findings" >> $GITHUB_STEP_SUMMARY
          fi

  # ================================================================
  # JOB 2: Balancer v2 Precision Hunt (6 часов)
  # ================================================================
  balancer-precision:
    name: Balancer v2 — Precision Loss Hunt
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 часов
    
    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      # Кэшируем зависимости между запусками
      - name: Cache Foundry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            lib/
            cache/
          key: foundry-${{ hashFiles('foundry.toml', 'lib/**') }}
          restore-keys: foundry-

      - name: Build
        run: forge build --sizes

      # Основная инвариантная кампания
      - name: Balancer Precision Invariant (1M runs)
        env:
          FOUNDRY_PROFILE: ci
        run: |
          forge test \
            --match-contract "BalancerPrecision|BalancerRateProvider|BalancerTwoStage" \
            --fork-url "$ETH_RPC_URL" \
            --fork-block-number latest \
            --invariant-runs 1000000 \
            --invariant-depth 500 \
            --fuzz-runs 500000 \
            --json 2>&1 | tee balancer-results.json
        continue-on-error: true

      - name: Balancer Boundary Fuzz (micro-swaps 8-9 wei)
        run: |
          forge test \
            --match-test "testFuzz_microSwapBoundary|test_microSwap" \
            --fork-url "$ETH_RPC_URL" \
            --fuzz-runs 5000000 \
            --json 2>&1 | tee balancer-boundary.json
        continue-on-error: true

      - name: Upload results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: balancer-results-${{ github.run_number }}
          path: |
            balancer-results.json
            balancer-boundary.json

      - name: Balancer Summary
        if: always()
        run: |
          echo "## ⚖️ Balancer v2 Precision Hunt" >> $GITHUB_STEP_SUMMARY
          python3 << 'EOF'
import json, sys
try:
    with open('balancer-results.json') as f:
        data = json.load(f)
    failed = [t for t in data if not t.get('success', True)]
    print(f"Failed invariants: {len(failed)}")
    for f in failed[:5]:
        print(f"  ❌ {f.get('name', 'unknown')}: {f.get('reason', '')}")
except Exception as e:
    print(f"Could not parse results: {e}")
EOF

  # ================================================================
  # JOB 3: Lido Oracle Boundary (4 часа)
  # ================================================================
  lido-oracle:
    name: Lido — Oracle & SimulatedShareRate
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            lib/
            cache/
          key: foundry-${{ hashFiles('foundry.toml') }}

      - name: Build
        run: forge build

      - name: Lido Oracle Invariant Campaign
        run: |
          forge test \
            --match-contract "LidoOracle|LidoShareRate|LidoBunker" \
            --fork-url "$ETH_RPC_URL" \
            --invariant-runs 500000 \
            --invariant-depth 300 \
            --fuzz-runs 1000000 \
            --json 2>&1 | tee lido-results.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lido-results-${{ github.run_number }}
          path: lido-results.json

  # ================================================================
  # JOB 4: Origin Protocol (4 часа)
  # ================================================================
  origin-protocol:
    name: Origin Protocol — ARM & Yield Forwarding
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            lib/
            cache/
          key: foundry-${{ hashFiles('foundry.toml') }}

      - name: Build
        run: forge build

      - name: Origin ARM Frontrun + Yield Forwarding
        run: |
          forge test \
            --match-contract "OriginProtocol|OriginARM|OriginYield" \
            --fork-url "$ETH_RPC_URL" \
            --invariant-runs 500000 \
            --fuzz-runs 1000000 \
            --json 2>&1 | tee origin-results.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: origin-results-${{ github.run_number }}
          path: origin-results.json

  # ================================================================
  # JOB 5: Enzyme GAV Timing (3 часа)
  # ================================================================
  enzyme-gav:
    name: Enzyme — GAV Timing Attack
    runs-on: ubuntu-latest
    timeout-minutes: 180
    needs: [balancer-precision]  # запускается после Balancer

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }
      - uses: foundry-rs/foundry-toolchain@v1

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.foundry
            lib/
            cache/
          key: foundry-${{ hashFiles('foundry.toml') }}

      - name: Build
        run: forge build

      - name: Enzyme GAV Timing + Share Price
        run: |
          forge test \
            --match-contract "EnzymeGAV|EnzymeSharePrice" \
            --fork-url "$ETH_RPC_URL" \
            --invariant-runs 300000 \
            --fuzz-runs 500000 \
            --json 2>&1 | tee enzyme-results.json
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: enzyme-results-${{ github.run_number }}
          path: enzyme-results.json

  # ================================================================
  # JOB 6: Medusa Stateful Fuzzing (6 часов) — САМЫЙ ЦЕННЫЙ
  # ================================================================
  medusa-campaign:
    name: Medusa Stateful Fuzzing
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - uses: actions/checkout@v4
        with: { submodules: recursive }

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Medusa
        run: |
          go install github.com/crytic/medusa/cmd/medusa@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Install Foundry (for compilation)
        uses: foundry-rs/foundry-toolchain@v1

      # Восстанавливаем corpus из предыдущих запусков
      - name: Restore Medusa corpus
        uses: actions/cache@v4
        with:
          path: corpus/
          key: medusa-corpus-${{ github.repository }}-${{ hashFiles('src/**/*.sol') }}
          restore-keys: |
            medusa-corpus-${{ github.repository }}-

      - name: Run Medusa Campaign
        run: |
          cat > medusa.json << 'EOF'
          {
            "fuzzing": {
              "workers": 4,
              "timeout": 21600,
              "testLimit": 100000000,
              "callSequenceLength": 100,
              "corpusDirectory": "corpus",
              "coverageEnabled": true,
              "targetContracts": ["BalancerHandler", "LidoHandler", "OriginHandler"],
              "assertionTesting": {
                "enabled": true,
                "testViewMethods": true
              },
              "propertyTesting": {
                "enabled": true,
                "testPrefixes": ["property_", "invariant_", "echidna_"]
              }
            },
            "compilation": {
              "platform": "crytic-compile",
              "platformConfig": {
                "target": ".",
                "solcVersion": "0.8.20"
              }
            }
          }
          EOF
          medusa fuzz --config medusa.json 2>&1 | tee medusa-output.log
        continue-on-error: true

      # Сохраняем обогащённый corpus для следующего запуска
      - name: Save Medusa corpus
        uses: actions/cache/save@v4
        if: always()
        with:
          path: corpus/
          key: medusa-corpus-${{ github.repository }}-${{ github.sha }}

      - name: Upload Medusa results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: medusa-campaign-${{ github.run_number }}
          path: |
            medusa-output.log
            corpus/

  # ================================================================
  # JOB 7: Итоговый отчёт (запускается после всех)
  # ================================================================
  audit-report:
    name: Generate Audit Report
    runs-on: ubuntu-latest
    needs: [static-analysis, balancer-precision, lido-oracle, origin-protocol, enzyme-gav]
    if: always()

    steps:
      - uses: actions/checkout@v4

      # Скачиваем все артефакты
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: audit-artifacts/

      - name: Generate consolidated report
        run: |
          python3 << 'PYEOF'
          import json, os, glob
          from datetime import datetime

          report = ["# 🔒 Audit Campaign Report"]
          report.append(f"**Date**: {datetime.now().strftime('%Y-%m-%d %H:%M UTC')}")
          report.append(f"**Commit**: ${{ github.sha }[:8] }}")
          report.append("")

          # Slither findings
          slither_files = glob.glob('audit-artifacts/**/slither-output.json', recursive=True)
          if slither_files:
              report.append("## Static Analysis (Slither)")
              try:
                  with open(slither_files[0]) as f:
                      data = json.load(f)
                  detectors = data.get('results', {}).get('detectors', [])
                  critical = [d for d in detectors if d.get('impact','').lower() in ['high','critical']]
                  report.append(f"- Total findings: **{len(detectors)}**")
                  report.append(f"- High/Critical: **{len(critical)}**")
                  for d in critical[:10]:
                      report.append(f"  - ❌ `{d.get('check')}`: {d.get('description','')[:100]}")
              except Exception as e:
                  report.append(f"- Parse error: {e}")

          # Foundry invariant results
          for protocol in ['balancer', 'lido', 'origin', 'enzyme']:
              json_files = glob.glob(f'audit-artifacts/**/{protocol}-results.json', recursive=True)
              if json_files:
                  report.append(f"## {protocol.title()} Results")
                  try:
                      with open(json_files[0]) as f:
                          data = json.load(f)
                      if isinstance(data, list):
                          failed = [t for t in data if not t.get('success', True)]
                          report.append(f"- Tests run: **{len(data)}**")
                          report.append(f"- Failed: **{len(failed)}**")
                          for t in failed[:5]:
                              report.append(f"  - 🚨 `{t.get('name', 'unknown')}`: {t.get('reason', '')[:100]}")
                  except Exception as e:
                      report.append(f"- Parse error: {e}")

          report_text = "\n".join(report)
          print(report_text)
          with open('AUDIT_REPORT.md', 'w') as f:
              f.write(report_text)
          PYEOF

      - name: Post summary
        run: cat AUDIT_REPORT.md >> $GITHUB_STEP_SUMMARY

      - name: Upload consolidated report
        uses: actions/upload-artifact@v4
        with:
          name: AUDIT_REPORT-${{ github.run_number }}
          path: AUDIT_REPORT.md

      # Постим комментарий в PR если это PR
      - name: Post PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('AUDIT_REPORT.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: report.slice(0, 65000)
            });
