# foundry.toml
[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
cache_path = "cache"
optimizer = true
optimizer_runs = 200

# Важно для fork тестов
eth_rpc_url = "${ETH_RPC_URL}"
fork_block_number = 0  # 0 = latest

# Инвариант fuzzing настройки
[profile.default.invariant]
runs = 1000          # локально — мало
depth = 100
fail_on_revert = false
call_override = false

# Для GitHub Actions — много
[profile.ci]
[profile.ci.invariant]
runs = 500000
depth = 500
fail_on_revert = false

[profile.ci.fuzz]
runs = 1000000

[profile.deep]
[profile.deep.invariant]
runs = 1000000
depth = 1000

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"

[rpc_endpoints]
mainnet = "${ETH_RPC_URL}"
